<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Điều Kì Diệu Của Tiệm Tạp Hóa Namiya</title>
    <style>
        /* Thiết kế cho thanh chữ trên cùng */
.thanh-chu-top {
    position: sticky; /* Giúp thanh này luôn bám dính ở cạnh trên màn hình */
    top: 0;
    left: 0;
    width: 100%;
    background-color: rgba(0, 0, 0, 0.8); /* Nền đen hơi trong suốt cho đẹp */
    color: #ffffff; /* Màu chữ trắng */
    text-align: center; /* Căn giữa chữ */
    padding: 12px 20px; /* Khoảng cách trên dưới và trái phải */
    font-family: "Verdana", serif;
    font-size: 16px;
    z-index: 100; /* Đảm bảo thanh này luôn nổi lên trên tấm ảnh */
    box-sizing: border-box;
}
        /* Xóa mọi viền trắng thừa của trình duyệt */
        body, html {
            margin: 0;
            padding: 0;
            background-color: #000; /* Để nền đen cho đồng bộ nếu ảnh có viền tối */
        }

        /* Khung bọc ngoài cùng (nút bấm khổng lồ) */
        .trang-bia-cuon {
            display: block; 
            width: 100%;
            text-decoration: none; /* Bỏ gạch chân của link */
            cursor: pointer;
        }

        /* Cài đặt cho ảnh: Full chiều ngang, nối đuôi nhau */
        .anh-bia {
            display: block; /* Xóa khoảng trống nhỏ mặc định dưới đáy mỗi tấm ảnh */
            width: 100%;    /* Bắt buộc ảnh giãn đủ 100% chiều ngang màn hình */
            height: auto;   /* Chiều cao tự động tính toán để chữ không bị méo hay lùn đi */
        }
    </style>
</head>
<body>

<body>

    <div class="thanh-chu-top">
        Một cuốn truyện với quá nhiều sự kỳ diệu, từ ban đầu là sách xuất bản đến sách tự in và giờ là đọc online. Năm lớp 11 có nằm mơ cũng không nghĩ đến những sự kỳ diệu này.
    </div>

    <a href="Chapter-1.html" class="trang-bia-cuon" title="Nhấn để đọc">
        <img src="2.png" alt="Bìa trước" class="anh-bia">
        <img src="1.png" alt="Bìa sau" class="anh-bia">
    </a>

</body>

</body>
</html>
